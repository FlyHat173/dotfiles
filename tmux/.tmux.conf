set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -gq allow-passthrough on
set -g visual-activity off
set-option -g focus-events on 


unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

set -g mouse on

unbind %
bind '1' split-window -h -c '#{pane_current_path}'

unbind '"'
bind '2' split-window -v -c '#{pane_current_path}'

unbind r 
# tmux source-file ~/.tmux.conf \;
bind r source-file ~/.tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r h resize-pane -L 5
bind -r l resize-pane -R 5

bind -r m resize-pane -Z

# copy
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key p run "tmux set-buffer -- \"$(wl-paste)\"; tmux paste-buffer"


# new window
bind c new-window -c '#{pane_current_path}'

# start from 1, not 0
set-option -g base-index 1
# re-number when closing windows
set-option -g renumber-windows on

# open a note for billion $ idea
bind -r e split-window -h "nvim ~/take-notes/"
# a quick todo list for today
bind -r o split-window -h "nvim ~/take-notes/todo_$(date +'%y%m%d').md"
# open a vim window on the right
bind -r v split-window -h -c "#{pane_current_path}" "bash -c 'nvim; exec bash'"

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin "janoamaral/tokyo-night-tmux"
run '~/.tmux/plugins/tokyo-night-tmux/tokyo-night.tmux'
run '~/.tmux/plugins/tpm/tpm'
run '~/.tmux/plugins/tmux-sensible/sensible.tmux'


### config theme
set -g @tokyo-night-tmux_theme storm   # night (default) | storm | moon | day
set -g @tokyo-night-tmux_transparent 0.70 # transparent background
set -g @tokyo-night-tmux_show_git 1             # local git status
set -g @tokyo-night-tmux_show_wbg 1             # GitHub / GitLab stats
set -g @tokyo-night-tmux_show_netspeed 1        # network speed
set -g @tokyo-night-tmux_show_battery_widget 1  # battery level
set -g @tokyo-night-tmux_show_music 1           # now playing
set -g @tokyo-night-tmux_show_path 1            # current path
set -g @tokyo-night-tmux_show_hostname 1        # machine hostname
